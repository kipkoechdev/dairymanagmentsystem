{% extends 'base.html' %}
{% block auth_content %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Salron Dairy Farm</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'DM Sans', sans-serif; background: #0d3d2b; min-height: 100vh; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle at 20% 80%, rgba(45,158,98,0.3) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(232,164,48,0.15) 0%, transparent 50%); }
.auth-card { background: #fff; border-radius: 24px; overflow: hidden; max-width: 420px; width: 100%; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
.auth-top { background: linear-gradient(135deg, #0d3d2b, #1a6642); padding: 40px; text-align: center; }
.auth-top h1 { font-family: 'Syne', sans-serif; color: white; font-size: 26px; font-weight: 800; margin: 12px 0 4px; }
.auth-top p { color: rgba(255,255,255,0.65); font-size: 13px; }
.auth-body { padding: 36px; }
.field-group { margin-bottom: 18px; }
.field-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; display: block; }
.field-input { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; transition: 0.2s; box-sizing: border-box; }
.field-input:focus { outline: none; border-color: #2d9e62; box-shadow: 0 0 0 3px rgba(45,158,98,0.1); }
.btn-auth { width: 100%; background: linear-gradient(135deg, #2d9e62, #1a6642); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: 'DM Sans', sans-serif; }
.btn-auth:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,158,98,0.35); }
</style>
</head>
<body>
<div class="auth-card">
    <div class="auth-top">
        <div style="font-size:52px">🐄</div>
        <h1>Salron Dairy Farm</h1>
        <p>Dairy Farm Management System</p>
    </div>
    <div class="auth-body">
        {% if form.errors %}
        <div style="background:#fee2e2;color:#dc2626;padding:12px;border-radius:10px;font-size:13px;margin-bottom:16px">
            Invalid username or password. Please try again.
        </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="field-group"><label class="field-label">Username</label>
            <input type="text" name="username" class="field-input" required autofocus placeholder="Enter your username"></div>
            <div class="field-group"><label class="field-label">Password</label>
            <input type="password" name="password" class="field-input" required placeholder="Enter your password"></div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn-auth">Sign In to My Farm →</button>
        </form>
        <p style="text-align:center;margin-top:24px;font-size:14px;color:#6b7280">
            New farmer? <a href="{% url 'register' %}" style="color:#2d9e62;font-weight:700">Create an Account</a>
        </p>
    </div>
</div>
</body>
</html>
{% endblock %}
