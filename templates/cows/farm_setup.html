{% extends 'base.html' %}
{% block auth_content %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Up Your Farm —Salron Dairy Farm</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'DM Sans', sans-serif; background: #f0fdf4; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.setup-card { background: white; border-radius: 24px; max-width: 560px; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,0.1); overflow: hidden; }
.setup-top { background: linear-gradient(135deg, #0d3d2b, #2d9e62); padding: 36px; text-align: center; color: white; }
.setup-top h1 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
.setup-body { padding: 36px; }
.fl { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; display: block; }
.fi { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; transition: 0.2s; box-sizing: border-box; }
.fi:focus { outline: none; border-color: #2d9e62; box-shadow: 0 0 0 3px rgba(45,158,98,0.1); }
.fg { margin-bottom: 16px; }
.btn-s { width: 100%; background: #2d9e62; color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; }
.btn-s:hover { background: #1a6642; }
</style>
</head>
<body>
<div class="setup-card">
    <div class="setup-top">
        <div style="font-size:48px;margin-bottom:12px">🏡</div>
        <h1>Set Up Your Farm</h1>
        <p style="color:rgba(255,255,255,0.75);font-size:14px;margin-top:6px">Tell us about your dairy farm to get started</p>
    </div>
    <div class="setup-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="fg"><label class="fl">Farm Name *</label>
            <input type="text" name="name" class="fi" required placeholder="e.g. Kamau Dairy Farm"></div>
            <div class="fg"><label class="fl">Location *</label>
            <input type="text" name="location" class="fi" required placeholder="e.g. Nakuru, Kenya"></div>
            <div class="fg"><label class="fl">Phone Number (for SMS reminders) *</label>
            <input type="text" name="phone" class="fi" required placeholder="+254700000000"></div>
            <div class="fg"><label class="fl">Email (optional)</label>
            <input type="email" name="email" class="fi" placeholder="farm@email.com"></div>
            <div class="fg"><label class="fl">Date Established</label>
            <input type="date" name="established_date" class="fi"></div>
            <button type="submit" class="btn-s">Launch My Farm Dashboard →</button>
        </form>
    </div>
</div>
</body>
</html>
{% endblock %}
